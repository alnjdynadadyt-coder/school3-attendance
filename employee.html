<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الحضور - المدرسة الثالثة</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        .btn-att { background: #28a745; color: white; border: none; }
        .btn-exit { background: #6f42c1; color: white; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>تسجيل الحضور اليومي</h2>
    <select id="empSelect"><option value="">-- اختر اسمك --</option></select>
    <button class="btn-att" onclick="mark('attendance')">تسجيل حضور</button>
    <button class="btn-exit" onclick="mark('exit')">تسجيل انصراف</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, setDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // نفس إعدادات مشروعك
    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyA_7S6EL-PCRt_ZznsnNtfV089NLc8yRV0",
        projectId: "school3-attendance",
        storageBucket: "school3-attendance.firebasestorage.app",
        messagingSenderId: "645753776685",
        appId: "1:645753776685:web:e3d8ddef2b4a523948a6a4"
    }));

    // جلب قائمة الموظفين عند تحميل الصفحة
    onSnapshot(collection(db, "employees"), (snap) => {
        const select = document.getElementById('empSelect');
        snap.forEach(d => {
            select.innerHTML += `<option value="${d.id}">${d.data().name}</option>`;
        });
    });

    window.mark = async (action) => {
        const select = document.getElementById('empSelect');
        const code = select.value;
        const name = select.options[select.selectedIndex].text;
        if(!code) { alert("يرجى اختيار الاسم"); return; }
        
        const date = new Date().toISOString().split('T')[0];
        const dayName = new Date().toLocaleDateString('ar-EG', {weekday: 'long'});
        const now = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit', hour12: false});

        const q = query(collection(db, "attendance"), where("empCode", "==", code), where("date", "==", date));
        const snap = await getDocs(q);

        if (action === 'attendance') {
            if(!snap.empty) { alert("تم تسجيل حضورك مسبقاً!"); return; }
            await addDoc(collection(db, "attendance"), { empCode: code, name, status: "حاضر", time: now, date, day: dayName });
            alert("تم تسجيل الحضور!");
        } else {
            if(snap.empty) { alert("يجب تسجيل الحضور أولاً!"); return; }
            await setDoc(doc(db, 'attendance', snap.docs[0].id), { exitTime: now }, { merge: true });
            alert("تم تسجيل الانصراف!");
        }
    };
</script>
</body>
</html>
