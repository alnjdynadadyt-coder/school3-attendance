<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الحضور - الموظفين</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { padding: 15px; width: 80%; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        .btn-reg { padding: 15px; font-size: 16px; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        #statusMsg { margin-bottom: 20px; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>تسجيل الحضور اليومي اعدادية النجدين</h2>
    <div id="statusMsg">جاري التحقق من موقعك...</div>
    <div id="regArea" style="display:none;">
        <input type="text" id="empCode" placeholder="أدخل كود الموظف">
        <button class="btn-reg" style="background:#28a745;" onclick="registerAttendance('attendance')">تسجيل الحضور</button>
        <button class="btn-reg" style="background:#6f42c1;" onclick="registerAttendance('exit')">تسجيل الانصراف</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDoc, doc, query, where, getDocs, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyA_7S6EL-PCRt_ZznsnNtfV089NLc8yRV0",
        projectId: "school3-attendance",
        storageBucket: "school3-attendance.firebasestorage.app",
        messagingSenderId: "645753776685",
        appId: "1:645753776685:web:e3d8ddef2b4a523948a6a4"
    }));

    let isLocationVerified = false;

    // التحقق من الموقع بدقة عالية
    navigator.geolocation.getCurrentPosition(pos => {
        const SCHOOL_LAT = 31.730757;
        const SCHOOL_LON = 44.988952;
        const R = 6371e3;
        const dLat = (pos.coords.latitude - SCHOOL_LAT) * Math.PI/180;
        const dLon = (pos.coords.longitude - SCHOOL_LON) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(SCHOOL_LAT*Math.PI/180) * Math.cos(pos.coords.latitude*Math.PI/180) * Math.sin(dLon/2)**2;
        const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

        if (dist <= 10000) {
            isLocationVerified = true;
            document.getElementById('statusMsg').innerText = "أهلاً بك، يمكنك تسجيل الحضور الآن.";
            document.getElementById('statusMsg').style.color = "green";
            document.getElementById('regArea').style.display = "block";
        } else {
            document.getElementById('statusMsg').innerText = "عذراً، أنت خارج النطاق المسموح به (خارج بناية المدرسة).";
            document.getElementById('statusMsg').style.color = "red";
        }
    }, () => alert("يرجى السماح بالوصول للموقع لتتمكن من التسجيل."), { enableHighAccuracy: true });

    window.registerAttendance = async (action) => {
        if (!isLocationVerified) {
            alert("لا يمكن التسجيل! الموقع غير مؤكد أو أنت خارج النطاق.");
            return;
        }

        const code = document.getElementById('empCode').value;
        if(!code) return alert("يرجى إدخال الكود!");

        const empSnap = await getDoc(doc(db, "employees", code));
        if (!empSnap.exists()) return alert("الكود غير صحيح!");

        const date = new Date().toISOString().split('T')[0];
        const dayName = new Date().toLocaleDateString('ar-EG', {weekday: 'long'});
        const now = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit', hour12: false});

        const q = query(collection(db, "attendance"), where("empCode", "==", code), where("date", "==", date));
        const snap = await getDocs(q);

        if (action === 'attendance') {
            if (!snap.empty) return alert("تم تسجيل حضورك مسبقاً اليوم!");
            await addDoc(collection(db, "attendance"), {
                empCode: code,
                name: empSnap.data().name,
                status: "حاضر",
                time: now,
                date: date,
                day: dayName,
                device: navigator.userAgent
            });
            alert("تم تسجيل الحضور بنجاح!");
        } else {
            if (snap.empty) return alert("لم تسجل حضورك اليوم لتتمكن من الانصراف!");
            await setDoc(doc(db, 'attendance', snap.docs[0].id), { exitTime: now }, { merge: true });
            alert("تم تسجيل الانصراف بنجاح!");
        }
    };
</script>
</body>
</html>
