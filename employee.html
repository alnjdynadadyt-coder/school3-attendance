<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الحضور - الموظف</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .btn-reg { padding: 20px 40px; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #statusMsg { margin-top: 20px; font-weight: bold; color: red; }
    </style>
</head>
<body>
    <h2>تسجيل الحضور - الموظفين</h2>
    <div id="statusMsg">جاري التحقق من موقعك...</div>
    <div id="regArea" style="display:none;">
        <input type="text" id="empCode" placeholder="كود الموظف"><br><br>
        <button class="btn-reg" onclick="registerAttendance()">تسجيل حضور</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ /* ضع هنا إعدادات Firebase الخاصة بك */ }));

    // إحداثيات المدرسة (من الصورة التي أرسلتها)
    const SCHOOL_LAT = 31.730757;
    const SCHOOL_LON = 44.988952;

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; // نصف قطر الأرض بالمتر
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    navigator.geolocation.getCurrentPosition(pos => {
        const dist = getDistance(pos.coords.latitude, pos.coords.longitude, SCHOOL_LAT, SCHOOL_LON);
        if (dist <= 300) {
            document.getElementById('statusMsg').innerText = "أنت داخل نطاق المدرسة، يمكنك التسجيل.";
            document.getElementById('statusMsg').style.color = "green";
            document.getElementById('regArea').style.display = "block";
        } else {
            document.getElementById('statusMsg').innerText = "عذراً، أنت خارج النطاق الجغرافي للمدرسة (" + Math.round(dist) + " متر).";
        }
    }, () => alert("يجب السماح بالوصول للموقع لتسجيل الحضور!"));

    window.registerAttendance = async () => { /* هنا نضع كود إضافة الحضور لـ Firebase */ };
</script>
</body>
</html>
