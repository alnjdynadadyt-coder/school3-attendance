<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور - المدرسة الثالثة</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" style="text-align:center;">
    <h2 style="color:#007bff;">نظام إدارة الحضور</h2>
    <h3>المدرسة الثالثة</h3>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, setDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyA_7S6EL-PCRt_ZznsnNtfV089NLc8yRV0",
        authDomain: "school3-attendance.firebaseapp.com",
        projectId: "school3-attendance",
        storageBucket: "school3-attendance.firebasestorage.app",
        messagingSenderId: "645753776685",
        appId: "1:645753776685:web:e3d8ddef2b4a523948a6a4"
    }));

    // الدالة الذكية الجديدة لتحديد الحالة (نظام 24 ساعة)
    const determineStatus = (type, dayIndex, timeInput) => {
        const [h, m] = timeInput.split(':').map(Number);
        const timeVal = h * 60 + m; // تحويل الوقت لدقائق من 00:00

        // الجمعة (5) والسبت (6)
        if (dayIndex === 5 || dayIndex === 6) {
            if (type === "حارس") {
                // الحارس: صباحي (قبل 12 ظهراً) حد 07:10، مسائي (بعد 12 ظهراً) حد 17:10
                if (timeVal < 12 * 60) return (timeVal <= (7 * 60 + 10)) ? "حاضر" : "متأخر";
                return (timeVal <= (17 * 60 + 10)) ? "حاضر" : "متأخر";
            }
        }

        // الأيام العادية أو الموظفين الآخرين
        // صباحي (قبل 11 صباحاً) حد 07:10، مسائي (من 11 صباحاً فصاعداً) حد 12:10
        if (timeVal < 11 * 60) {
            return (timeVal <= (7 * 60 + 10)) ? "حاضر" : "متأخر";
        } else {
            return (timeVal <= (12 * 60 + 10)) ? "حاضر" : "متأخر";
        }
    };

    window.quickAction = async (code, name, type, action) => {
        const date = document.getElementById('dateSelector').value;
        const now = new Date();
        const timeInput = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const dayIndex = now.getDay();
        
        const q = query(collection(db, "attendance"), where("empCode", "==", code), where("date", "==", date));
        const snap = await getDocs(q);

        if (action === 'attendance') {
            if (!snap.empty) { alert("الموظف مسجل بالفعل لهذا اليوم!"); return; }
            let status = determineStatus(type, dayIndex, timeInput);
            await addDoc(collection(db, "attendance"), { empCode: code, name, status, time: timeInput, exitTime: "", date, day: now.toLocaleDateString('ar-EG', {weekday: 'long'}), reason: "" });
            alert("تم تسجيل حضور: " + name + " كـ " + status);
        } else {
            if (snap.empty) { alert("لم يتم تسجيل الحضور بعد!"); return; }
            await setDoc(doc(db, 'attendance', snap.docs[0].id), { exitTime: timeInput }, { merge: true });
            alert("تم تسجيل انصراف");
        }
    };

    // (تأكد من وضع دالة determineStatus داخل registerAttendance أيضاً)
    window.registerAttendance = async () => {
        const code = document.getElementById('empCode').value;
        const date = document.getElementById('dateSelector').value;
        const timeInput = document.getElementById('customTime').value;
        const dayIndex = new Date(date).getDay();
        
        const empSnap = await getDoc(doc(db, "employees", code));
        if (!empSnap.exists()) { alert("الكود غير موجود"); return; }
        const empData = empSnap.data();

        let status = determineStatus(empData.type, dayIndex, timeInput);
        
        await addDoc(collection(db, "attendance"), { empCode: code, name: empData.name, status, time: timeInput, exitTime: "", date, day: new Date(date).toLocaleDateString('ar-EG', {weekday: 'long'}), reason: "" });
        alert("تم التسجيل كـ: " + status);
    };

    // ... (بقية الدوال تبقى كما هي)
    renderTable();
</script>
</body>
</html>
