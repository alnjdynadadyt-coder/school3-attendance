<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>النظام الإداري المتكامل - المدرسة الثالثة</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-card { flex: 1; padding: 15px; text-align: center; color: white; border-radius: 8px; font-weight: bold; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container" style="text-align:center;">
    <h2 style="color:#007bff;">نظام إدارة الحضور والتقارير</h2>
</div>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card" style="background:#007bff">حاضر: <span id="s_حاضر">0</span></div>
        <div class="stat-card" style="background:#ffc107">متأخر: <span id="s_متأخر">0</span></div>
        <div class="stat-card" style="background:#28a745">مجاز: <span id="s_مجاز">0</span></div>
        <div class="stat-card" style="background:#dc3545">غائب: <span id="s_غائب">0</span></div>
    </div>
    <input type="date" id="dateSelector" onchange="renderTable()">
    <button onclick="exportExcel()">تصدير Excel</button>
    <button onclick="backupData()">نسخة احتياطية (JSON)</button>
</div>

<div class="container">
    <h3>تسجيل يدوي (مع الوقت والحالة)</h3>
    <input type="text" id="mCode" placeholder="كود الموظف">
    <select id="mStatus"><option>حاضر</option><option>متأخر</option><option>مجاز</option><option>غائب</option></select>
    <input type="time" id="mTime">
    <input type="text" id="mReason" placeholder="السبب/الملاحظات">
    <button onclick="registerManual()" style="background:#007bff; color:white;">تسجيل</button>
</div>

<div class="container">
    <table id="mainTable">
        <thead><tr><th>الاسم</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>السبب</th><th>إجراء</th></tr></thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyA_7S6EL-PCRt_ZznsnNtfV089NLc8yRV0",
        projectId: "school3-attendance",
        storageBucket: "school3-attendance.firebasestorage.app",
        messagingSenderId: "645753776685",
        appId: "1:645753776685:web:e3d8ddef2b4a523948a6a4"
    }));

    window.registerManual = async () => {
        const code = document.getElementById('mCode').value;
        const status = document.getElementById('mStatus').value;
        const time = document.getElementById('mTime').value;
        const reason = document.getElementById('mReason').value;
        const date = document.getElementById('dateSelector').value || new Date().toISOString().split('T')[0];

        const empSnap = await getDocs(query(collection(db, "employees"), where("code", "==", code))); // افتراض أنك تستخدم هذا الهيكل
        const name = empSnap.empty ? "غير معروف" : empSnap.docs[0].data().name;

        await addDoc(collection(db, "attendance"), { empCode: code, name, status, time, reason, date });
        alert("تم التسجيل!");
    };

    window.renderTable = () => {
        const date = document.getElementById('dateSelector').value || new Date().toISOString().split('T')[0];
        onSnapshot(query(collection(db, "attendance"), where("date", "==", date)), snap => {
            let rows = "", stats = {حاضر:0, متأخر:0, مجاز:0, غائب:0};
            snap.forEach(d => {
                let data = d.data();
                if(stats.hasOwnProperty(data.status)) stats[data.status]++;
                rows += `<tr><td>${data.name}</td><td>${data.date}</td><td>${data.time}</td><td>${data.status}</td><td>${data.reason||''}</td><td><button onclick="deleteRow('${d.id}')">حذف</button></td></tr>`;
            });
            document.getElementById('attendanceTable').innerHTML = rows;
            for(let k in stats) document.getElementById('s_'+k).innerText = stats[k];
        });
    };

    window.deleteRow = (id) => deleteDoc(doc(db, 'attendance', id));
    
    window.exportExcel = () => {
        let content = "<table>" + document.getElementById('mainTable').innerHTML + "</table>";
        let a = document.createElement('a');
        a.href = 'data:application/vnd.ms-excel,' + encodeURIComponent(content);
        a.download = 'تقرير_الحضور.xls';
        a.click();
    };

    window.backupData = async () => {
        const snap = await getDocs(collection(db, "attendance"));
        let data = []; snap.forEach(d => data.push(d.data()));
        const a = document.createElement('a');
        a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(data));
        a.download = "backup.json";
        a.click();
    };

    document.getElementById('dateSelector').valueAsDate = new Date();
    renderTable();
</script>
</body>
</html>
