<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة حضور المدرسة الثالثة</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .nav-btn { padding: 10px 20px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #333; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" style="text-align:center;">
    <h2>لوحة تحكم المدير - المدرسة الثالثة</h2>
    <div class="nav-bar">
        <button class="nav-btn" onclick="show('quick')">التسجيل السريع</button>
        <button class="nav-btn" onclick="show('manual')">التسجيل اليدوي</button>
        <button class="nav-btn" onclick="show('reports')">التقارير</button>
        <button class="nav-btn" onclick="show('emps')">إدارة الموظفين</button>
    </div>
</div>

<div id="quick" class="container">
    <h3>التسجيل السريع</h3>
    <table><thead><tr><th>الاسم</th><th>إجراء</th></tr></thead><tbody id="quickList"></tbody></table>
</div>

<div id="manual" class="container hidden">
    <h3>التسجيل اليدوي</h3>
    <input type="text" id="mCode" placeholder="كود الموظف">
    <select id="mStatus"><option>حاضر</option><option>متأخر</option><option>مجاز</option><option>غائب</option></select>
    <input type="time" id="mTime">
    <button onclick="saveManual()">حفظ</button>
</div>

<div id="reports" class="container hidden">
    <h3>التقارير</h3>
    <div id="reportArea"></div>
</div>

<div id="emps" class="container hidden">
    <h3>قائمة الموظفين</h3>
    <table><thead><tr><th>الكود</th><th>الاسم</th></tr></thead><tbody id="empList"></tbody></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyA_7S6EL-PCRt_ZznsnNtfV089NLc8yRV0",
        projectId: "school3-attendance",
        storageBucket: "school3-attendance.firebasestorage.app",
        messagingSenderId: "645753776685",
        appId: "1:645753776685:web:e3d8ddef2b4a523948a6a4"
    }));

    window.show = (id) => {
        ['quick', 'manual', 'reports', 'emps'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    // جلب البيانات وإعادة بناء الجداول
    onSnapshot(collection(db, "employees"), (snap) => {
        const quick = document.getElementById('quickList');
        const emp = document.getElementById('empList');
        quick.innerHTML = ""; emp.innerHTML = "";
        snap.forEach(d => {
            quick.innerHTML += `<tr><td>${d.data().name}</td><td><button>حضور</button></td></tr>`;
            emp.innerHTML += `<tr><td>${d.id}</td><td>${d.data().name}</td></tr>`;
        });
    });
</script>
</body>
</html>
