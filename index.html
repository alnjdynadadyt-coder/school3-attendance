<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور - المدرسة الثالثة</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .btn-quick { background: #28a745; color: white; padding: 5px 10px; border-radius: 3px; margin: 2px; }
        .btn-exit { background: #6f42c1; color: white; padding: 5px 10px; border-radius: 3px; margin: 2px; }
    </style>
</head>
<body>

<div class="container" style="text-align:center;">
    <h2 style="color:#007bff;">نظام إدارة الحضور - المدرسة الثالثة</h2>
</div>

<div class="container">
    <h3>لوحة التسجيل السريع</h3>
    <table id="quickTable"><thead><tr><th>الاسم</th><th>النوع</th><th>إجراءات</th></tr></thead><tbody id="quickAttendanceTable"></tbody></table>
</div>

<div class="container">
    <input type="date" id="dateSelector" onchange="renderTable()">
    <h3>تسجيل يدوي</h3>
    <div class="input-group">
        <input type="text" id="empCode" placeholder="كود الموظف">
        <select id="status"><option>حاضر</option><option>متأخر</option><option>مجاز</option></select>
        <input type="time" id="customTime">
        <button onclick="registerAttendance()" style="background:#007bff; color:white;">تسجيل</button>
    </div>
    <table id="mainTable">
        <thead><tr><th>الاسم</th><th>التاريخ</th><th>الحضور</th><th>الانصراف</th><th>الحالة</th><th>إجراء</th></tr></thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, setDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyA_7S6EL-PCRt_ZznsnNtfV089NLc8yRV0",
        authDomain: "school3-attendance.firebaseapp.com",
        projectId: "school3-attendance",
        storageBucket: "school3-attendance.firebasestorage.app",
        messagingSenderId: "645753776685",
        appId: "1:645753776685:web:e3d8ddef2b4a523948a6a4"
    }));

    // دالة تحديد الحالة الذكية (نظام 24 ساعة)
    const determineStatus = (type, dayIndex, timeInput) => {
        const [h, m] = timeInput.split(':').map(Number);
        const timeVal = h * 60 + m; 

        // الجمعة (5) والسبت (6)
        if (dayIndex === 5 || dayIndex === 6) {
            if (type === "حارس") {
                return (timeVal < 12 * 60) 
                    ? ((timeVal <= (7 * 60 + 10)) ? "حاضر" : "متأخر") 
                    : ((timeVal <= (17 * 60 + 10)) ? "حاضر" : "متأخر");
            }
        }
        // الأيام العادية أو الموظفين الآخرين
        return (timeVal < 11 * 60) 
            ? ((timeVal <= (7 * 60 + 10)) ? "حاضر" : "متأخر") 
            : ((timeVal <= (12 * 60 + 10)) ? "حاضر" : "متأخر");
    };

    window.quickAction = async (code, name, type, action) => {
        const date = document.getElementById('dateSelector').value;
        const now = new Date();
        const timeInput = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const dayIndex = now.getDay();
        
        const q = query(collection(db, "attendance"), where("empCode", "==", code), where("date", "==", date));
        const snap = await getDocs(q);

        if (action === 'attendance') {
            if (!snap.empty) { alert("الموظف مسجل بالفعل!"); return; }
            let status = determineStatus(type, dayIndex, timeInput);
            await addDoc(collection(db, "attendance"), { empCode: code, name, status, time: timeInput, exitTime: "", date });
            alert("تم تسجيل الحضور كـ: " + status);
        } else {
            if (snap.empty) { alert("لا يوجد سجل حضور!"); return; }
            await setDoc(doc(db, 'attendance', snap.docs[0].id), { exitTime: timeInput }, { merge: true });
            alert("تم تسجيل الانصراف");
        }
    };

    window.registerAttendance = async () => {
        const code = document.getElementById('empCode').value;
        const date = document.getElementById('dateSelector').value;
        const timeInput = document.getElementById('customTime').value;
        const statusRaw = document.getElementById('status').value;
        const dayIndex = new Date(date).getDay();
        
        const empSnap = await getDoc(doc(db, "employees", code));
        if (!empSnap.exists()) { alert("كود غير موجود"); return; }
        const empData = empSnap.data();

        let status = (statusRaw === "حاضر") ? determineStatus(empData.type, dayIndex, timeInput) : statusRaw;
        await addDoc(collection(db, "attendance"), { empCode: code, name: empData.name, status, time: timeInput, date });
        alert("تم التسجيل");
    };

    window.renderTable = () => {
        const date = document.getElementById('dateSelector').value;
        onSnapshot(query(collection(db, "attendance"), where("date", "==", date)), snap => {
            let rows = "";
            snap.forEach(d => {
                let data = d.data();
                rows += `<tr><td>${data.name}</td><td>${data.date}</td><td>${data.time}</td><td>${data.exitTime || ''}</td><td>${data.status}</td>
                <td><button class="btn-del" onclick="deleteDoc(doc(db, 'attendance', '${d.id}'))">حذف</button></td></tr>`;
            });
            document.getElementById('attendanceTable').innerHTML = rows;
        });
    };

    onSnapshot(collection(db, "employees"), snap => {
        let qRows = "";
        snap.forEach(d => {
            let data = d.data();
            qRows += `<tr><td>${data.name}</td><td>${data.type}</td><td>
            <button class="btn-quick" onclick="quickAction('${d.id}', '${data.name}', '${data.type}', 'attendance')">حضور</button>
            <button class="btn-exit" onclick="quickAction('${d.id}', '${data.name}', '${data.type}', 'exit')">انصراف</button>
            </td></tr>`;
        });
        document.getElementById('quickAttendanceTable').innerHTML = qRows;
    });

    document.getElementById('dateSelector').valueAsDate = new Date();
    document.getElementById('customTime').value = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit', hour12: false});
    renderTable();
</script>
</body>
</html>
