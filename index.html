<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور - المدرسة الثالثة</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 120px; padding: 15px; text-align: center; color: white; border-radius: 8px; font-weight: bold; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .btn-quick { background: #28a745; color: white; padding: 5px 10px; border-radius: 3px; margin: 2px; }
        .btn-exit { background: #6f42c1; color: white; padding: 5px 10px; border-radius: 3px; margin: 2px; }
    </style>
</head>
<body>

<div class="container" style="text-align:center;">
    <h2 style="color:#007bff;">نظام إدارة الحضور</h2>
    <h3>المدرسة النجدين</h3>
</div>

<div class="container">
    <h3>لوحة التسجيل السريع</h3>
    <table id="quickTable">
        <thead><tr><th>الاسم</th><th>النوع</th><th>إجراءات</th></tr></thead>
        <tbody id="quickAttendanceTable"></tbody>
    </table>
</div>

<div class="container">
    <h3>التحكم في التاريخ والتقارير</h3>
    <input type="date" id="dateSelector" onchange="renderTable()">
    
    <div class="stats-bar" style="margin-top: 20px;">
        <div class="stat-card" style="background:#007bff">حاضر: <span id="s_حاضر">0</span></div>
        <div class="stat-card" style="background:#ffc107">متأخر: <span id="s_متأخر">0</span></div>
    </div>

    <h3>تسجيل الحضور اليدوي</h3>
    <div class="input-group">
        <input type="text" id="empCode" placeholder="كود الموظف">
        <select id="status"><option>حاضر</option><option>متأخر</option></select>
        <input type="time" id="customTime">
        <button onclick="registerAttendance()" style="background:#007bff; color:white;">تسجيل</button>
    </div>
    <table id="mainTable">
        <thead><tr><th>الاسم</th><th>اليوم</th><th>التاريخ</th><th>الحضور</th><th>الانصراف</th><th>الحالة</th><th>إجراء</th></tr></thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, setDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyA_7S6EL-PCRt_ZznsnNtfV089NLc8yRV0",
        projectId: "school3-attendance",
        storageBucket: "school3-attendance.firebasestorage.app",
        messagingSenderId: "645753776685",
        appId: "1:645753776685:web:e3d8ddef2b4a523948a6a4"
    }));

    // دالة منطق الوقت الموحد
    const getStatus = (type, timeInput, dayIndex) => {
        if (type === "حارس") {
            let limit = (dayIndex === 5 || dayIndex === 6) ? "07:05" : "17:05";
            return (timeInput <= limit) ? "حاضر" : "متأخر";
        }
        let limit = (type === "موظف") ? "07:10" : (type === "إداري") ? "07:40" : "08:10";
        return (timeInput <= limit) ? "حاضر" : "متأخر";
    };

    window.quickAction = async (code, name, type, action) => {
        const now = new Date();
        const date = now.toISOString().split('T')[0];
        const timeInput = now.toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit', hour12: false});
        const dayIndex = now.getDay();
        
        const q = query(collection(db, "attendance"), where("empCode", "==", code), where("date", "==", date));
        const snap = await getDocs(q);

        if (action === 'attendance') {
            if (!snap.empty) { alert("الموظف مسجل بالفعل!"); return; }
            let status = getStatus(type, timeInput, dayIndex);
            await addDoc(collection(db, "attendance"), { empCode: code, name, status, time: timeInput, exitTime: "", date, day: now.toLocaleDateString('ar-EG', {weekday: 'long'}) });
            alert("تم تسجيل الحضور");
        } else {
            if (snap.empty) { alert("لم يسجل الحضور!"); return; }
            await setDoc(doc(db, 'attendance', snap.docs[0].id), { exitTime: timeInput }, { merge: true });
            alert("تم تسجيل الانصراف");
        }
    };

    window.renderTable = () => {
        const date = document.getElementById('dateSelector').value;
        onSnapshot(query(collection(db, "attendance"), where("date", "==", date)), snap => {
            let rows = "", stats = {حاضر:0, متأخر:0};
            snap.forEach(d => {
                let data = d.data();
                if(stats.hasOwnProperty(data.status)) stats[data.status]++;
                rows += `<tr><td>${data.name}</td><td>${data.day}</td><td>${data.date}</td><td>${data.time}</td>
                <td><input type="time" onchange="updateExitTime('${d.id}', this.value)" value="${data.exitTime || ''}"></td>
                <td>${data.status}</td><td><button class="btn-del" onclick="deleteDoc(doc(db, 'attendance', '${d.id}'))">حذف</button></td></tr>`;
            });
            document.getElementById('attendanceTable').innerHTML = rows;
            for(let k in stats) document.getElementById('s_'+k).innerText = stats[k];
        });
    };

    window.registerAttendance = async () => {
        const code = document.getElementById('empCode').value;
        const date = document.getElementById('dateSelector').value;
        const timeInput = document.getElementById('customTime').value || new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit', hour12: false});
        
        const empSnap = await getDoc(doc(db, "employees", code));
        if (!empSnap.exists()) { alert("كود غير موجود"); return; }
        
        const dayIndex = new Date(date).getDay();
        let status = getStatus(empSnap.data().type, timeInput, dayIndex);
        
        await addDoc(collection(db, "attendance"), { empCode: code, name: empSnap.data().name, status, time: timeInput, date, day: new Date(date).toLocaleDateString('ar-EG', {weekday: 'long'}) });
        alert("تم التسجيل");
    };

    window.updateExitTime = async (id, val) => await setDoc(doc(db, 'attendance', id), { exitTime: val }, { merge: true });

    onSnapshot(collection(db, "employees"), snap => {
        let qRows = "";
        snap.forEach(d => {
            let data = d.data();
            qRows += `<tr><td>${data.name}</td><td>${data.type}</td><td>
            <button class="btn-quick" onclick="quickAction('${d.id}', '${data.name}', '${data.type}', 'attendance')">حضور</button>
            <button class="btn-exit" onclick="quickAction('${d.id}', '${data.name}', '${data.type}', 'exit')">انصراف</button></td></tr>`;
        });
        document.getElementById('quickAttendanceTable').innerHTML = qRows;
    });

    document.getElementById('dateSelector').valueAsDate = new Date();
    renderTable();
</script>
</body>
</html>
